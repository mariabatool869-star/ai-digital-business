<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - AzlanAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #050714;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .auth-logo { text-align: center; margin-bottom: 32px; }
        .auth-logo .logo-icon {
            width: 48px; height: 48px; border-radius: 12px;
            background: linear-gradient(90deg, #2dd4bf, #a855f7);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px; font-size: 24px; color: #fff;
            box-shadow: 0 4px 20px rgba(168,85,247,0.3);
        }
        .auth-logo h1 { font-size: 24px; font-weight: 700; }
        .auth-logo h1 span { color: #a855f7; }
        .auth-logo p { color: #64748b; font-size: 14px; margin-top: 4px; }
        .auth-tabs {
            display: flex; gap: 8px; margin-bottom: 28px;
            background: rgba(255,255,255,0.04); border-radius: 12px; padding: 4px;
        }
        .auth-tab {
            flex: 1; padding: 10px; border: none; background: transparent;
            color: #64748b; font-family: 'Inter', sans-serif; font-weight: 600;
            font-size: 14px; border-radius: 8px; cursor: pointer; transition: all 0.3s;
        }
        .auth-tab.active { background: linear-gradient(90deg, #2dd4bf, #a855f7); color: #fff; }
        .auth-tab:hover:not(.active) { color: #fff; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; color: #94a3b8; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.06); border-radius: 10px;
            background: rgba(255,255,255,0.04); color: #fff;
            font-size: 14px; font-family: 'Inter', sans-serif; transition: border 0.3s;
        }
        .form-group input:focus { border-color: #a855f7; outline: none; }
        .form-group input::placeholder { color: #475569; }
        .btn-primary {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            background: linear-gradient(90deg, #2dd4bf, #a855f7);
            color: #fff; font-size: 16px; font-weight: 600;
            font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.3s;
        }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 8px 30px rgba(168,85,247,0.3); }
        .auth-message {
            text-align: center; font-size: 14px; margin-top: 16px;
            padding: 10px; border-radius: 8px; display: none;
        }
        .auth-message.error {
            display: block; background: rgba(239,68,68,0.1);
            color: #ef4444; border: 1px solid rgba(239,68,68,0.2);
        }
        .auth-message.success {
            display: block; background: rgba(34,197,94,0.1);
            color: #22c55e; border: 1px solid rgba(34,197,94,0.2);
        }
        .back-link {
            display: inline-block; margin-top: 16px;
            color: #64748b; text-decoration: none; font-size: 14px;
            transition: color 0.3s;
        }
        .back-link:hover { color: #fff; }
        .back-link i { margin-right: 6px; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-logo">
            <div class="logo-icon"><i class="fas fa-crown"></i></div>
            <h1>Azlan<span>AI</span></h1>
            <p>Digital World</p>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">Login</button>
            <button class="auth-tab" onclick="switchTab('register')">Register</button>
        </div>

        <div class="auth-form active" id="loginForm">
            <form onsubmit="login(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required />
                </div>
                <button type="submit" class="btn-primary">Login</button>
                <div class="auth-message" id="loginMessage"></div>
            </form>
        </div>

        <div class="auth-form" id="registerForm">
            <form onsubmit="register(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="registerName" placeholder="John Doe" required />
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" placeholder="your@email.com" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="registerPassword" placeholder="••••••••" required />
                </div>
                <button type="submit" class="btn-primary">Create Account</button>
                <div class="auth-message" id="registerMessage"></div>
            </form>
        </div>

        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>

    <script>
        // ✅ FIXED: Works on both localhost and Vercel
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:5000/api/auth' 
            : 'https://ai-digital-business.vercel.app/api/auth';

        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.auth-tab:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.auth-tab:last-child').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        function showMessage(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.className = 'auth-message ' + type;
        }

        async function login(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data));
                    showMessage('loginMessage', '✅ Login successful! Redirecting...', 'success');
                    if (data.role === 'admin') {
                        setTimeout(() => window.location.href = '/dashboard.html', 1500);
                    } else {
                        setTimeout(() => window.location.href = '/user-dashboard.html', 1500);
                    }
                } else {
                    showMessage('loginMessage', '❌ ' + data.message, 'error');
                }
            } catch (err) {
                showMessage('loginMessage', '❌ Server error. Please try again.', 'error');
            }
        }

        async function register(e) {
            e.preventDefault();
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    showMessage('registerMessage', '✅ Account created! Please login.', 'success');
                    setTimeout(() => switchTab('login'), 1500);
                } else {
                    showMessage('registerMessage', '❌ ' + data.message, 'error');
                }
            } catch (err) {
                showMessage('registerMessage', '❌ Server error. Please try again.', 'error');
            }
        }
    </script>

</body>
</html>
