<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - AzlanAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing:border-box;margin:0;padding:0; }
        body { font-family:Inter,sans-serif;background:#050714;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px; }
        .card { background:#0f172a;border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:40px;max-width:400px;width:100%;color:#fff; }
        h1 { font-size:22px;margin-bottom:8px; }
        p { color:#94a3b8;font-size:14px;margin-bottom:20px; }
        input { width:100%;padding:12px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;background:rgba(255,255,255,0.04);color:#fff;margin-bottom:14px;font-family:inherit; }
        button { width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(90deg,#2dd4bf,#a855f7);color:#fff;font-weight:600;cursor:pointer;font-family:inherit; }
        .msg { margin-top:12px;font-size:14px;padding:10px;border-radius:8px;display:none; }
        .msg.ok { display:block;background:rgba(34,197,94,0.1);color:#22c55e; }
        .msg.err { display:block;background:rgba(239,68,68,0.1);color:#ef4444; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Reset Password</h1>
        <p>Enter your new password below.</p>
        <form onsubmit="resetPassword(event)">
            <input type="password" id="password" placeholder="New password (min 6 chars)" minlength="6" required />
            <input type="password" id="confirm" placeholder="Confirm password" minlength="6" required />
            <button type="submit">Update Password</button>
            <div class="msg" id="msg"></div>
        </form>
    </div>
    <script>
        const API = window.location.hostname === 'localhost' ? 'http://localhost:5000/api/auth' : 'https://ai-digital-business.vercel.app/api/auth';
        const token = new URLSearchParams(window.location.search).get('token');
        async function resetPassword(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const msg = document.getElementById('msg');
            if (password !== confirm) { msg.className='msg err'; msg.textContent='Passwords do not match'; return; }
            if (!token) { msg.className='msg err'; msg.textContent='Invalid reset link'; return; }
            const res = await fetch(`${API}/reset-password`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ token, password })
            });
            const data = await res.json();
            msg.className = res.ok ? 'msg ok' : 'msg err';
            msg.textContent = data.message;
            if (res.ok) setTimeout(() => window.location.href='/auth.html', 2000);
        }
    </script>
</body>
</html>
