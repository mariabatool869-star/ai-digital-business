<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Successful - AzlanAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4f8; color: #0f172a;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .card {
            background: #fff; border: 1px solid #e2e8f0; border-radius: 16px;
            padding: 48px 40px; max-width: 520px; width: 100%; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
        }
        .icon-circle {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(34,197,94,0.12); color: #22c55e;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px; margin: 0 auto 24px;
        }
        .icon-circle.loading { background: rgba(168,85,247,0.12); color: #a855f7; }
        .icon-circle.error { background: rgba(239,68,68,0.12); color: #ef4444; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
        p { color: #64748b; line-height: 1.6; margin-bottom: 8px; }
        .order-id { font-size: 14px; color: #94a3b8; margin: 16px 0 24px; }
        .order-id strong { color: #0f172a; }
        .total { font-size: 24px; font-weight: 800; color: #a855f7; margin: 16px 0; }
        .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 28px; }
        .btn {
            padding: 12px 24px; border-radius: 8px; font-weight: 600;
            text-decoration: none; font-size: 14px; transition: all 0.2s;
            font-family: 'Inter', sans-serif; border: none; cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(90deg, #2dd4bf, #a855f7); color: #fff;
        }
        .btn-primary:hover { transform: scale(1.02); }
        .btn-outline { background: #fff; color: #64748b; border: 1px solid #e2e8f0; }
        .btn-outline:hover { background: #f8fafc; }
        .items-list { text-align: left; margin: 20px 0; }
        .item-row {
            display: flex; justify-content: space-between; padding: 8px 0;
            border-bottom: 1px solid #f1f5f9; font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="card" id="card">
        <div class="icon-circle loading" id="statusIcon"><i class="fas fa-spinner fa-spin"></i></div>
        <h1 id="title">Verifying Payment...</h1>
        <p id="message">Please wait while we confirm your payment.</p>
        <div id="details" style="display:none;">
            <div class="order-id">Order ID: <strong id="orderId"></strong></div>
            <div class="total" id="orderTotal"></div>
            <div class="items-list" id="itemsList"></div>
            <p style="font-size:13px;margin-top:16px;"><i class="fas fa-envelope" style="color:#a855f7;"></i> A payment receipt has been sent to your email.</p>
        </div>
        <div class="actions" id="actions" style="display:none;">
            <a href="/user-dashboard.html" class="btn btn-primary">Go to Dashboard</a>
            <a href="/products.html" class="btn btn-outline">Continue Shopping</a>
        </div>
    </div>

    <script src="/js/cart.js"></script>
    <script>
        const API_URL = window.location.hostname === 'localhost'
            ? 'http://localhost:5000/api'
            : 'https://ai-digital-business.vercel.app/api';

        function getToken() { return localStorage.getItem('token'); }

        function showSuccess(order) {
            document.getElementById('statusIcon').className = 'icon-circle';
            document.getElementById('statusIcon').innerHTML = '<i class="fas fa-check"></i>';
            document.getElementById('title').textContent = 'Payment Successful!';
            document.getElementById('message').textContent = 'Thank you for your purchase at AzlanAI.';
            document.getElementById('orderId').textContent = order._id;
            document.getElementById('orderTotal').textContent = '$' + order.totalAmount.toFixed(2);
            document.getElementById('itemsList').innerHTML = order.items.map(i => `
                <div class="item-row">
                    <span>${i.name} × ${i.quantity}</span>
                    <span>$${(i.price * i.quantity).toFixed(2)}</span>
                </div>
            `).join('');
            document.getElementById('details').style.display = 'block';
            document.getElementById('actions').style.display = 'flex';
            AzlanCart.clear();
        }

        function showError(msg) {
            document.getElementById('statusIcon').className = 'icon-circle error';
            document.getElementById('statusIcon').innerHTML = '<i class="fas fa-times"></i>';
            document.getElementById('title').textContent = 'Verification Failed';
            document.getElementById('message').textContent = msg;
            document.getElementById('actions').style.display = 'flex';
            document.getElementById('actions').innerHTML = `
                <a href="/checkout.html" class="btn btn-primary">Try Again</a>
                <a href="/products.html" class="btn btn-outline">Browse Products</a>`;
        }

        async function verify() {
            const params = new URLSearchParams(window.location.search);
            const sessionId = params.get('session_id');
            const token = getToken();

            if (!sessionId) {
                showError('No payment session found.');
                return;
            }
            if (!token) {
                showError('Please login to view your order confirmation.');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/payments/verify/${sessionId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message);

                if (data.paymentStatus === 'paid') {
                    showSuccess(data.order);
                } else {
                    showError('Payment is still processing. Check your email for confirmation.');
                }
            } catch (err) {
                showError(err.message || 'Could not verify payment.');
            }
        }

        verify();
    </script>
</body>
</html>
